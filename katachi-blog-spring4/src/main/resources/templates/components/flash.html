<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
</head>
<body>
	<div layout:fragment="flash"
		th:if="${success}"
		class="toast-container position-fixed bottom-0 end-0 p-3"
	>
		<div id="flashMessage" class="toast text-bg-info" role="alert" aria-live="assertive" aria-atomic="true">
			<div class="toast-body text-white" th:text="${success}"></div>
		</div>
		<script>
			document.addEventListener('DOMContentLoaded', function() {
				const flashMessage = document.getElementById('flashMessage')
				if (flashMessage) {
					new bootstrap.Toast(flashMessage).show()
				}
			})
		</script>
	</div>
</body>
</html>
